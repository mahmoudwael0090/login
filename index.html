<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        div{
            border: 2px white solid;
            border-radius: 4px;
            box-shadow: 0 1px 2px black;
            padding-bottom: 75px;
            padding-top: 75px;
            margin-top: 100px;
        }
        div:hover{
            border: 2px white solid;
            border-radius: 6px;
            box-shadow: 0 2px 4px black;
            padding-bottom: 75px;
            padding-top: 75px;
            margin-top: 100px;
        }
        img{
            width: 75px;
            margin-left: 130px;
            padding-bottom: 36px;
        }
        h1{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            color: rgb(71, 71, 194);
            text-align: center;
            margin: 0;
        }
        .em{
            text-align: center;
            border: black solid 1px;
            border-radius: 7px;
            margin-top: 20px;
            font-size: 20px;
            margin-left: 40px;
        }
        .si{
            color: black;
            border: rgb(71, 71, 194) solid 2px;
            border-radius: 6px;
            background-color: rgba(71, 71, 194, 0);
            font-size: 16px;
            margin-left: 140px;
            margin-top: 20px;
        }
        .si:hover{
            color: white;
            border: rgb(71, 71, 194) solid 2px;
            border-radius: 8px;
            background-color: rgb(71, 71, 194);
            font-size: 20px;
            margin-left: 140px;
            margin-top: 20px;
        }
    </style>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="1260673.png">
    <title>facebook</title>
</head>

<body>
<div>
    <img src="1260673.png" alt="photo">
    <h1>facebook</h1>
    <input type="email" name="email" placeholder="Enter Your Email" class="em"><br>
    <input type="password" name="password" placeholder="Enter Your Password" class="em"><br>
    <input type="submit" value="Login" class="si"><br>
</div>
</body>

</html>
